    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // *** CONFIGURACIÓN: FECHA DE CORTE ***
        // Modificar esta fecha cuando cambie el mes
        const FECHA_CORTE = "20 de abril de 2026";
        // *** FIN CONFIGURACIÓN ***

        function App() {
            // Estado para controlar la pantalla actual
            const [pantalla, setPantalla] = useState('menu'); // 'menu', 'actividad', 'retirado', 'ayuda', 'mensajes', 'cajaPolicial', 'reglas'
            const [seccionReglas, setSeccionReglas] = useState(''); // Para saber qué sección de reglas mostrar
            
            const [monto, setMonto] = useState('');
            const [montoHaberes, setMontoHaberes] = useState('');
            const [cuotas, setCuotas] = useState('72');
            const [cuotasHaberes, setCuotasHaberes] = useState('72');
            const [montoAfectacion, setMontoAfectacion] = useState('');
            const [montoAfectacionHaberes, setMontoAfectacionHaberes] = useState('');
            const [haberNetoHaberes, setHaberNetoHaberes] = useState('');
            const [haberNetoActividad, setHaberNetoActividad] = useState('');
            const [resultado, setResultado] = useState(null);
            const [resultadoHaberes, setResultadoHaberes] = useState(null);
            const [error, setError] = useState('');
            const [errorHaberes, setErrorHaberes] = useState('');
            const [montoMaximo, setMontoMaximo] = useState(30000000);
            const [montoMaximoHaberes, setMontoMaximoHaberes] = useState(30000000);
            const [montoMaximoSMSV, setMontoMaximoSMSV] = useState(null);
            const [cargandoMontoMaximo, setCargandoMontoMaximo] = useState(false);
            const [mostrarTabla, setMostrarTabla] = useState(false);
            const [modificarTasa, setModificarTasa] = useState(false);
            const [tasaPersonalizada, setTasaPersonalizada] = useState('48.00');
            const [esSocioNuevo, setEsSocioNuevo] = useState(false);
            const [esSocioNuevoHaberes, setEsSocioNuevoHaberes] = useState(false);
            const [esPoderdanteHaberes, setEsPoderdanteHaberes] = useState(false);
            const [modificarCuotaSocial, setModificarCuotaSocial] = useState(false);
            const [cuotaSocialPersonalizada, setCuotaSocialPersonalizada] = useState('20470');
            const [cuotaSocialEditadaManualmente, setCuotaSocialEditadaManualmente] = useState(false);
            const [buscandoCuotaSocial, setBuscandoCuotaSocial] = useState(false);
            const [mesesDiferimientoActividad, setMesesDiferimientoActividad] = useState(0); // 0 o 3
            const [mesesDiferimientoHaberes, setMesesDiferimientoHaberes] = useState(0); // 0 o 3
            
            // Estados para consulta BCRA
            const [mostrarConsultaBCRA, setMostrarConsultaBCRA] = useState(false);
            const [cuil, setCuil] = useState('');
            const [consultandoBCRA, setConsultandoBCRA] = useState(false);
            const [resultadoBCRA, setResultadoBCRA] = useState(null);
            const [errorBCRA, setErrorBCRA] = useState('');
            
            // Estados para carga manual BCRA
            const [mostrarCargaManual, setMostrarCargaManual] = useState(false);
            const [textoCargaManual, setTextoCargaManual] = useState('');
            const [errorCargaManual, setErrorCargaManual] = useState('');
            
            // Estados para pantalla retirado
            const [haberNeto, setHaberNeto] = useState('');
            const [esPoderdante, setEsPoderdante] = useState(false);
            const [montoAyudaEconomica, setMontoAyudaEconomica] = useState('');
            const [resultadoRetirado, setResultadoRetirado] = useState(null);
            const [errorRetirado, setErrorRetirado] = useState('');
            const [esSocioNuevoRetirado, setEsSocioNuevoRetirado] = useState(false);
            const [mesesDiferimientoRetirado, setMesesDiferimientoRetirado] = useState(0); // 0 o 3
            
            // Estados para pantalla Caja Policial (misma funcionalidad que retirado)
            const [haberNetoCaja, setHaberNetoCaja] = useState('');
            const [esPoderdanteCaja, setEsPoderdanteCaja] = useState(false);
            const [montoAyudaEconomicaCaja, setMontoAyudaEconomicaCaja] = useState('');
            const [resultadoCaja, setResultadoCaja] = useState(null);
            const [errorCaja, setErrorCaja] = useState('');
            const [esSocioNuevoCaja, setEsSocioNuevoCaja] = useState(false);
            const [mesesDiferimientoCaja, setMesesDiferimientoCaja] = useState(0); // 0 o 3
            
            // Estados para cuotas de ayuda económica
            const [cuotasAyudaEconomica, setCuotasAyudaEconomica] = useState([
                { id: 1, monto: '', saldoAyuda: '', seCancela: false, tasaCancelacion: '' },
                { id: 2, monto: '', saldoAyuda: '', seCancela: false, tasaCancelacion: '' },
                { id: 3, monto: '', saldoAyuda: '', seCancela: false, tasaCancelacion: '' }
            ]);
            
            // Estados para calculadora de monto de afectación
            const [mostrarCalculadora, setMostrarCalculadora] = useState(false);
            const [displayCalculadora, setDisplayCalculadora] = useState('');
            const [operacionCalculadora, setOperacionCalculadora] = useState('');
            
            // Estados para cuotas de ayuda económica de Caja Policial
            const [cuotasAyudaEconomicaCaja, setCuotasAyudaEconomicaCaja] = useState([
                { id: 1, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 2, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 3, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }
            ]);
            
            // Estados para cuotas de ayuda económica en pantalla En Actividad
            const [cuotasAyudaEconomicaEnActividad, setCuotasAyudaEconomicaEnActividad] = useState([
                { id: 1, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 2, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 3, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }
            ]);
            
            // Estados para cuotas de ayuda económica en pantalla Haberes (Caja Policial - Haberes)
            const [cuotasAyudaEconomicaHaberes, setCuotasAyudaEconomicaHaberes] = useState([
                { id: 1, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 2, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' },
                { id: 3, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }
            ]);
            
            // Estado para canal de pago de Caja Policial
            const [canalPagoCajaPolicial, setCanalPagoCajaPolicial] = useState(''); // '', 'haberes', 'caja'

            // Estados para fecha de pago/otorgamiento
            const obtenerFechaManana = () => {
                const manana = new Date();
                manana.setDate(manana.getDate() + 1);
                return manana.toISOString().split('T')[0];
            };
            const [fechaPagoRetirado, setFechaPagoRetirado] = useState(obtenerFechaManana());
            const [fechaPagoCaja, setFechaPagoCaja] = useState(obtenerFechaManana());
            const [fechaPagoActividad, setFechaPagoActividad] = useState(obtenerFechaManana());
            const [fechaPagoHaberes, setFechaPagoHaberes] = useState(obtenerFechaManana());

            // Estados para Salario Mínimo Vital y Móvil
            const [salarioMinimo, setSalarioMinimo] = useState(null);
            const [modificarSalarioMinimo, setModificarSalarioMinimo] = useState(false);
            const [salarioMinimoPersonalizado, setSalarioMinimoPersonalizado] = useState('');
            const [salarioMinimoEditadoManualmente, setSalarioMinimoEditadoManualmente] = useState(false);

            // Estados para mensajes predeterminados
            const [mensajesPredeterminados, setMensajesPredeterminados] = useState(() => {
                const guardados = localStorage.getItem('mensajesPredeterminados');
                return guardados ? JSON.parse(guardados) : [];
            });
            const [categorias, setCategorias] = useState(() => {
                const guardadas = localStorage.getItem('categoriasMensajes');
                return guardadas ? JSON.parse(guardadas) : ['General'];
            });
            const [nuevoMensaje, setNuevoMensaje] = useState('');
            const [tituloMensaje, setTituloMensaje] = useState('');
            const [categoriaSeleccionada, setCategoriaSeleccionada] = useState('General');
            const [nuevaCategoria, setNuevaCategoria] = useState('');
            const [editandoIndice, setEditandoIndice] = useState(null);
            const [categoriaFiltro, setCategoriaFiltro] = useState('Todas');

            // ============================================================
            // CONFIGURACIÓN DE PARÁMETROS - ACTUALIZAR AQUÍ MANUALMENTE
            // ============================================================
            
            // TNA - Tasa Nominal Anual (%)
            const TNA_DEFAULT = 48.00;
            
            // TOPE - Monto Máximo de Ayuda Económica ($)
            const MONTO_MAXIMO_ABSOLUTO = 30000000;
            
            // CUOTA SOCIAL - Valor vigente ($)
            const CUOTA_SOCIAL_DEFAULT = 20470;
            
            // SALARIO MÍNIMO VITAL Y MÓVIL - Valor vigente ($)
            const SALARIO_MINIMO_DEFAULT = 352400;
            
            // ============================================================
            // FIN CONFIGURACIÓN
            // ============================================================
            
            const CUOTA_SOCIAL = cuotaSocialEditadaManualmente 
                ? parseFloat(cuotaSocialPersonalizada) 
                : (modificarCuotaSocial ? parseFloat(cuotaSocialPersonalizada) : CUOTA_SOCIAL_DEFAULT);
            const PLANES_CUOTAS = [24, 30, 36, 48, 60, 72];
            
            // Usar la tasa personalizada si está habilitada, sino usar la default
            const TNA = modificarTasa ? parseFloat(tasaPersonalizada) : TNA_DEFAULT;
            
            // Usar el salario mínimo personalizado si fue editado manualmente, sino usar el default
            const SALARIO_MINIMO = salarioMinimoEditadoManualmente 
                ? parseFloat(salarioMinimoPersonalizado) 
                : (modificarSalarioMinimo ? parseFloat(salarioMinimoPersonalizado) : SALARIO_MINIMO_DEFAULT);

            // useEffect para inicializar el salario mínimo al cargar la app
            useEffect(() => {
                // Cargar el salario mínimo guardado si fue editado manualmente
                const salarioGuardado = localStorage.getItem('salarioMinimoPersonalizado');
                const editadoManualmente = localStorage.getItem('salarioMinimoEditadoManualmente') === 'true';
                
                if (editadoManualmente && salarioGuardado) {
                    setSalarioMinimoPersonalizado(salarioGuardado);
                    setSalarioMinimoEditadoManualmente(true);
                    setSalarioMinimo(parseFloat(salarioGuardado));
                } else {
                    setSalarioMinimo(SALARIO_MINIMO_DEFAULT);
                }
            }, []);

            // Buscar cuota social y monto máximo al cargar la app - DESHABILITADO
            // La actualización de parámetros ahora es manual modificando el HTML
            // useEffect(() => {
            //     buscarCuotaSocialVigente();
            //     buscarTNAVigente();
            //     obtenerMontoMaximoSMSV();
            // }, []);

            // Migrar datos antiguos al nuevo formato con categorías y títulos
            useEffect(() => {
                const guardados = localStorage.getItem('mensajesPredeterminados');
                if (guardados) {
                    const mensajes = JSON.parse(guardados);
                    // Verificar si los mensajes están en formato antiguo
                    if (mensajes.length > 0) {
                        let necesitaMigracion = false;
                        
                        // Formato muy antiguo (string)
                        if (typeof mensajes[0] === 'string') {
                            necesitaMigracion = true;
                        }
                        // Formato anterior (sin título)
                        else if (!mensajes[0].hasOwnProperty('titulo')) {
                            necesitaMigracion = true;
                        }
                        
                        if (necesitaMigracion) {
                            const mensajesMigrados = mensajes.map(item => {
                                if (typeof item === 'string') {
                                    return {
                                        titulo: 'Sin título',
                                        texto: item,
                                        categoria: 'General'
                                    };
                                } else {
                                    return {
                                        titulo: item.titulo || 'Sin título',
                                        texto: item.texto,
                                        categoria: item.categoria || 'General'
                                    };
                                }
                            });
                            setMensajesPredeterminados(mensajesMigrados);
                            localStorage.setItem('mensajesPredeterminados', JSON.stringify(mensajesMigrados));
                        }
                    }
                }
            }, []);

            // Funciones para mensajes predeterminados
            const guardarMensaje = () => {
                if (!nuevoMensaje.trim()) {
                    alert('Por favor, escribe un mensaje');
                    return;
                }
                
                if (!tituloMensaje.trim()) {
                    alert('Por favor, escribe un título para el mensaje');
                    return;
                }
                
                if (mensajesPredeterminados.length >= 30 && editandoIndice === null) {
                    alert('Has alcanzado el límite de 30 mensajes. Elimina uno para agregar otro.');
                    return;
                }

                let nuevosMensajes;
                if (editandoIndice !== null) {
                    // Editar mensaje existente
                    nuevosMensajes = [...mensajesPredeterminados];
                    nuevosMensajes[editandoIndice] = {
                        titulo: tituloMensaje,
                        texto: nuevoMensaje,
                        categoria: categoriaSeleccionada
                    };
                    setEditandoIndice(null);
                } else {
                    // Agregar nuevo mensaje
                    nuevosMensajes = [...mensajesPredeterminados, {
                        titulo: tituloMensaje,
                        texto: nuevoMensaje,
                        categoria: categoriaSeleccionada
                    }];
                }
                
                setMensajesPredeterminados(nuevosMensajes);
                localStorage.setItem('mensajesPredeterminados', JSON.stringify(nuevosMensajes));
                setNuevoMensaje('');
                setTituloMensaje('');
                setCategoriaSeleccionada('General');
            };

            const eliminarMensaje = (indice) => {
                const nuevosMensajes = mensajesPredeterminados.filter((_, i) => i !== indice);
                setMensajesPredeterminados(nuevosMensajes);
                localStorage.setItem('mensajesPredeterminados', JSON.stringify(nuevosMensajes));
            };

            const editarMensaje = (indice) => {
                const mensaje = mensajesPredeterminados[indice];
                setTituloMensaje(mensaje.titulo || '');
                setNuevoMensaje(mensaje.texto);
                setCategoriaSeleccionada(mensaje.categoria);
                setEditandoIndice(indice);
            };

            const compartirMensajePredeterminadoWhatsApp = (titulo, mensaje) => {
                const mensajeCodificado = encodeURIComponent(mensaje);
                const urlWhatsApp = `https://wa.me/?text=${mensajeCodificado}`;
                window.open(urlWhatsApp, '_blank');
            };

            const compartirMensajePredeterminadoEmail = (titulo, mensaje) => {
                const cuerpo = encodeURIComponent(mensaje);
                const mailtoLink = `mailto:?body=${cuerpo}`;
                window.location.href = mailtoLink;
            };

            const agregarCategoria = () => {
                if (!nuevaCategoria.trim()) {
                    alert('Por favor, escribe un nombre para la categoría');
                    return;
                }
                
                if (categorias.includes(nuevaCategoria.trim())) {
                    alert('Esta categoría ya existe');
                    return;
                }
                
                const nuevasCategorias = [...categorias, nuevaCategoria.trim()];
                setCategorias(nuevasCategorias);
                localStorage.setItem('categoriasMensajes', JSON.stringify(nuevasCategorias));
                setCategoriaSeleccionada(nuevaCategoria.trim());
                setNuevaCategoria('');
            };

            const eliminarCategoria = (categoria) => {
                if (categoria === 'General') {
                    alert('No se puede eliminar la categoría General');
                    return;
                }
                
                // Verificar si hay mensajes en esta categoría
                const mensajesEnCategoria = mensajesPredeterminados.filter(m => m.categoria === categoria);
                if (mensajesEnCategoria.length > 0) {
                    alert(`No se puede eliminar. Hay ${mensajesEnCategoria.length} mensaje(s) en esta categoría. Elimínalos o muévelos primero.`);
                    return;
                }
                
                const nuevasCategorias = categorias.filter(c => c !== categoria);
                setCategorias(nuevasCategorias);
                localStorage.setItem('categoriasMensajes', JSON.stringify(nuevasCategorias));
                if (categoriaSeleccionada === categoria) {
                    setCategoriaSeleccionada('General');
                }
                if (categoriaFiltro === categoria) {
                    setCategoriaFiltro('Todas');
                }
            };

            const mensajesFiltrados = categoriaFiltro === 'Todas' 
                ? mensajesPredeterminados 
                : mensajesPredeterminados.filter(m => m.categoria === categoriaFiltro);

            // Función para formatear CUIL
            const formatearCUIL = (valor) => {
                const numeros = valor.replace(/\D/g, '');
                const limitado = numeros.slice(0, 11);
                if (limitado.length <= 2) return limitado;
                if (limitado.length <= 10) return `${limitado.slice(0, 2)}-${limitado.slice(2)}`;
                return `${limitado.slice(0, 2)}-${limitado.slice(2, 10)}-${limitado.slice(10)}`;
            };

            // Función para consultar BCRA
            const consultarBCRA = async () => {
                setConsultandoBCRA(true);
                setErrorBCRA('');
                setResultadoBCRA(null);

                const cuilLimpio = cuil.replace(/\D/g, '');

                if (cuilLimpio.length !== 11) {
                    setErrorBCRA('El CUIL debe tener 11 dígitos');
                    setConsultandoBCRA(false);
                    return;
                }

                try {
                    const response = await fetch(`https://api.bcra.gob.ar/centraldedeudores/v1.0/Deudas/${cuilLimpio}`);
                    const data = await response.json();

                    if (data.status === 200) {
                        // Multiplicar los montos por 1000 ya que la API devuelve en miles
                        const resultadoProcesado = {
                            ...data.results,
                            periodos: data.results.periodos.map(periodo => ({
                                ...periodo,
                                entidades: periodo.entidades.map(entidad => ({
                                    ...entidad,
                                    monto: entidad.monto * 1000
                                }))
                            }))
                        };
                        setResultadoBCRA(resultadoProcesado);
                    } else if (data.status === 404) {
                        setErrorBCRA('No se encontraron datos para el CUIL ingresado');
                    } else if (data.errorMessages && data.errorMessages.length > 0) {
                        setErrorBCRA(data.errorMessages[0]);
                    } else {
                        setErrorBCRA('Error al consultar la Central de Deudores');
                    }
                } catch (error) {
                    setErrorBCRA('Error de conexión. Por favor, intente nuevamente.');
                    console.error('Error:', error);
                } finally {
                    setConsultandoBCRA(false);
                }
            };

            // Función para procesar texto pegado de Central de Deudores BCRA
            const procesarCargaManual = () => {
                setErrorCargaManual('');
                setErrorBCRA('');
                setResultadoBCRA(null);

                if (!textoCargaManual.trim()) {
                    setErrorCargaManual('Por favor, pegue el texto de la Central de Deudores del BCRA');
                    return;
                }

                try {
                    // Extraer el CUIL/CUIT del texto (primer grupo de 11 dígitos) - OPCIONAL
                    const cuilMatch = textoCargaManual.match(/\b\d{11}\b/);
                    const cuilEncontrado = cuilMatch ? cuilMatch[0] : '';

                    // Extraer el nombre (texto antes del primer banco/entidad)
                    const nombreMatch = textoCargaManual.match(/^([A-ZÁÉÍÓÚÑ\s]+)(?=BANCO|MERCADOLIBRE|NARANJA|CREDITOS|TARJETA|BBVA|SANTANDER|GALICIA|HSBC|MACRO|NACION|PATAGONIA|ICBC|SUPERVIELLE|CIUDAD|PROVINCIA|BIND|CREDICOOP|BAPRO|COMAFI)/);
                    const nombreEncontrado = nombreMatch ? nombreMatch[1].trim() : 'PERSONA FÍSICA';

                    // Regex para identificar cada deuda
                    // Formato: [NOMBRE][ENTIDAD][PERIODO MM/AA][SITUACION 1-6][MONTO][N/A o número][-]
                    const regexDeuda = /([A-ZÁÉÍÓÚÑ\s.]+?)(BANCO[A-ZÁÉÍÓÚÑ\s.]+|MERCADOLIBRE[A-ZÁÉÍÓÚÑ\s.]+|NARANJA[A-ZÁÉÍÓÚÑ\s.]+|CREDITOS[A-ZÁÉÍÓÚÑ\s.]+|TARJETA[A-ZÁÉÍÓÚÑ\s.]+|[A-ZÁÉÍÓÚÑ]+\sS\.R\.L\.|[A-ZÁÉÍÓÚÑ]+\sS\.A\.)\s*(\d{2}\/\d{2})\s*(\d)\s*([\d.]+)\s*(N\/A|\d+)\s*-/g;

                    const deudas = [];
                    let match;

                    while ((match = regexDeuda.exec(textoCargaManual)) !== null) {
                        const entidad = match[2].trim();
                        const periodo = match[3]; // MM/AA
                        const situacion = parseInt(match[4]);
                        const montoTexto = match[5].replace(/\./g, ''); // Eliminar puntos de miles
                        const monto = parseFloat(montoTexto);

                        // Convertir periodo MM/AA a formato AAAAMM
                        const [mes, anio] = periodo.split('/');
                        const periodoFormateado = parseInt(`20${anio}${mes}`);

                        deudas.push({
                            entidad: entidad,
                            situacion: situacion,
                            monto: monto * 1000, // Multiplicar por 1000 el monto pegado
                            diasAtrasoPago: 0
                        });
                    }

                    if (deudas.length === 0) {
                        setErrorCargaManual('No se pudieron identificar deudas en el texto pegado. Asegúrese de copiar el texto directamente desde la web del BCRA.');
                        return;
                    }

                    // Agrupar por el periodo más reciente
                    const periodoMasReciente = textoCargaManual.match(/\d{2}\/\d{2}/);
                    if (!periodoMasReciente) {
                        setErrorCargaManual('No se pudo identificar el periodo en el texto');
                        return;
                    }

                    const [mes, anio] = periodoMasReciente[0].split('/');
                    const periodoNumerico = parseInt(`20${anio}${mes}`);

                    // Crear objeto de resultado compatible con la API del BCRA
                    const resultadoManual = {
                        identificacion: cuilEncontrado,
                        denominacion: nombreEncontrado,
                        periodos: [
                            {
                                periodo: periodoNumerico,
                                entidades: deudas
                            }
                        ]
                    };

                    // Establecer el resultado
                    setResultadoBCRA(resultadoManual);
                    if (cuilEncontrado) {
                        setCuil(formatearCUIL(cuilEncontrado));
                    }
                    setTextoCargaManual('');
                    setMostrarCargaManual(false);

                } catch (error) {
                    console.error('Error al procesar texto:', error);
                    setErrorCargaManual('Error al procesar el texto. Asegúrese de copiar el formato correcto desde la web del BCRA.');
                }
            };

            // Función para obtener el nombre de la situación
            const obtenerNombreSituacion = (codigo) => {
                const situaciones = {
                    1: 'Normal',
                    2: 'Con Problemas',
                    3: 'Irrecuperable'
                };
                return situaciones[codigo] || 'Desconocido';
            };

            // Función para calcular la suma de montos en situación 3, 4 y 5
            const calcularSumaSituaciones345 = (resultadoBCRA) => {
                if (!resultadoBCRA || !resultadoBCRA.periodos || resultadoBCRA.periodos.length === 0) {
                    return 0;
                }
                
                const suma = resultadoBCRA.periodos[0].entidades.reduce((total, entidad) => {
                    if (entidad.situacion === 3 || entidad.situacion === 4 || entidad.situacion === 5) {
                        return total + (entidad.monto || 0);
                    }
                    return total;
                }, 0);
                
                return suma;
            };

            // Función para formatear el período de AAAAMM a MM/AAAA
            const formatearPeriodo = (periodo) => {
                const periodoStr = periodo.toString();
                if (periodoStr.length === 6) {
                    const año = periodoStr.substring(0, 4);
                    const mes = periodoStr.substring(4, 6);
                    return `${mes}/${año}`;
                }
                return periodo;
            };
            
            // Función para formatear el haber neto
            const formatearHaberNeto = (valor) => {
                // Permitir números, punto y coma
                valor = valor.replace(/[^0-9.,]/g, '');
                // Reemplazar coma por punto para procesamiento interno
                valor = valor.replace(/,/g, '.');
                // Permitir solo un punto decimal
                const partes = valor.split('.');
                if (partes.length > 2) {
                    valor = partes[0] + '.' + partes.slice(1).join('');
                }
                // Limitar a 2 decimales
                if (partes.length === 2 && partes[1].length > 2) {
                    valor = partes[0] + '.' + partes[1].substring(0, 2);
                }
                // Mostrar con coma como separador decimal
                return valor.replace(/\./g, ',');
            };
            
            // Función para manejar cambio de haber neto
            const handleHaberNetoChange = (e) => {
                const valorFormateado = formatearHaberNeto(e.target.value);
                setHaberNeto(valorFormateado);
            };
            
            // Funciones auxiliares para formatear números con decimales
            const formatearNumeroDecimal = (valor) => {
                // Eliminar todo excepto números, punto y coma
                let limpio = valor.replace(/[^\d.,]/g, '');
                
                // Reemplazar punto por coma (para usar coma como separador decimal)
                limpio = limpio.replace(/\./g, ',');
                
                // Permitir solo una coma decimal
                const partes = limpio.split(',');
                if (partes.length > 2) {
                    limpio = partes[0] + ',' + partes.slice(1).join('');
                }
                
                // Limitar a 2 decimales
                if (partes.length === 2 && partes[1].length > 2) {
                    limpio = partes[0] + ',' + partes[1].substring(0, 2);
                }
                
                return limpio;
            };
            
            const parseNumeroDecimal = (valor) => {
                if (!valor) return 0;
                // Reemplazar coma por punto para parsear correctamente como número
                return parseFloat(valor.replace(',', '.')) || 0;
            };
            
            // Calcular el porcentaje del haber neto según si es poderdante o no
            const calcularPorcentajeHaber = () => {
                if (!haberNeto) return 0;
                // Reemplazar coma por punto para parseFloat
                const haberNetoNumerico = parseFloat(haberNeto.replace(/,/g, '.'));
                
                // Calcular el total de TODAS las cuotas de ayuda económica
                const totalCuotasAyuda = cuotasAyudaEconomica.reduce((total, cuota) => {
                    if (cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                // Haber Neto Absoluto = Haber Neto + Total de TODAS las Cuotas
                const haberNetoAbsoluto = haberNetoNumerico + totalCuotasAyuda;
                
                // Calcular el porcentaje según si es poderdante o no
                const porcentaje = esPoderdante ? 0.45 : 0.40;
                let montoAfectacion = haberNetoAbsoluto * porcentaje;
                
                // Si es socio nuevo, restar la cuota social
                if (esSocioNuevoRetirado) {
                    montoAfectacion = montoAfectacion - CUOTA_SOCIAL;
                }
                
                // Restar las cuotas que NO se cancelan
                const cuotasNoSeCancelan = cuotasAyudaEconomica.reduce((total, cuota) => {
                    if (!cuota.seCancela && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                montoAfectacion = montoAfectacion - cuotasNoSeCancelan;
                
                return montoAfectacion;
            };
            
            // Funciones para manejar cuotas de ayuda económica
            const agregarCuotaAyuda = () => {
                const nuevoId = cuotasAyudaEconomica.length > 0 
                    ? Math.max(...cuotasAyudaEconomica.map(c => c.id)) + 1 
                    : 1;
                setCuotasAyudaEconomica([...cuotasAyudaEconomica, { id: nuevoId, monto: '', saldoAyuda: '', seCancela: false, tasaCancelacion: '' }]);
            };
            
            const actualizarCuotaAyuda = (id, valor) => {
                setCuotasAyudaEconomica(cuotasAyudaEconomica.map(cuota => 
                    cuota.id === id ? { ...cuota, monto: valor } : cuota
                ));
            };
            
            const actualizarSaldoAyuda = (id, valor) => {
                setCuotasAyudaEconomica(cuotasAyudaEconomica.map(cuota => 
                    cuota.id === id ? { ...cuota, saldoAyuda: valor } : cuota
                ));
            };
            
            const toggleCancelacionCuota = (id) => {
                setCuotasAyudaEconomica(cuotasAyudaEconomica.map(cuota => 
                    cuota.id === id ? { ...cuota, seCancela: !cuota.seCancela, tasaCancelacion: !cuota.seCancela ? cuota.tasaCancelacion : '' } : cuota
                ));
            };
            
            const actualizarTasaCancelacion = (id, valor) => {
                // Permitir solo números enteros
                const valorLimpio = valor.replace(/[^\d]/g, '');
                setCuotasAyudaEconomica(cuotasAyudaEconomica.map(cuota => 
                    cuota.id === id ? { ...cuota, tasaCancelacion: valorLimpio } : cuota
                ));
            };
            
            const eliminarCuotaAyuda = (id) => {
                if (cuotasAyudaEconomica.length > 1) {
                    setCuotasAyudaEconomica(cuotasAyudaEconomica.filter(cuota => cuota.id !== id));
                }
            };
            
            const calcularTotalCuotasAyuda = () => {
                return cuotasAyudaEconomica.reduce((total, cuota) => {
                    const monto = parseNumeroDecimal(cuota.monto);
                    return total + monto;
                }, 0);
            };

            /**
             * Función para calcular los intereses diferidos (intereses anticipados)
             * desde el momento del otorgamiento hasta el inicio de la amortización.
             * 
             * @param {number} montoSolicitado - Capital del préstamo
             * @param {number} tna - Tasa Nominal Anual (en porcentaje, ej: 56.00)
             * @param {number} mesesDiferimiento - 0 para plan normal, 3 para plan diferido
             * @param {Date} fechaOtorgamiento - Fecha de otorgamiento del crédito (default: hoy)
             * @returns {Object} { interesesMonto, diasCalculados, fechaPrimerVencimiento }
             */
            const calcularInteresesDiferidos = (montoSolicitado, tna, mesesDiferimiento = 0, fechaOtorgamiento = new Date()) => {
                // La Fecha de Corte es el día 20 de cada mes
                const DIA_CORTE = 20;
                
                // Obtener el día del mes de la fecha de otorgamiento
                const diaOtorgamiento = fechaOtorgamiento.getDate();
                const mesOtorgamiento = fechaOtorgamiento.getMonth(); // 0-11
                const anioOtorgamiento = fechaOtorgamiento.getFullYear();
                
                // Calcular la fecha de corte del mes actual
                const fechaCorteMesActual = new Date(anioOtorgamiento, mesOtorgamiento, DIA_CORTE);
                
                // Determinar la fecha del primer cargo según la lógica:
                // - Si se otorga ANTES o EN el día 20 → primer cargo es el mes siguiente (día 1)
                // - Si se otorga DESPUÉS del día 20 → primer cargo es dentro de 2 meses (día 1)
                let fechaPrimerCargo;
                
                if (diaOtorgamiento <= DIA_CORTE) {
                    // Primer cargo es el día 1 del mes siguiente
                    fechaPrimerCargo = new Date(anioOtorgamiento, mesOtorgamiento + 1, 1);
                } else {
                    // Primer cargo es el día 1 de dentro de 2 meses
                    fechaPrimerCargo = new Date(anioOtorgamiento, mesOtorgamiento + 2, 1);
                }
                
                // Si hay diferimiento de 3 meses, sumar 3 meses adicionales
                if (mesesDiferimiento === 3) {
                    fechaPrimerCargo = new Date(
                        fechaPrimerCargo.getFullYear(),
                        fechaPrimerCargo.getMonth() + 3,
                        1
                    );
                }
                
                // Calcular la cantidad de días exactos entre el otorgamiento y el primer cargo
                const milisegundosPorDia = 1000 * 60 * 60 * 24;
                const diferenciaMilisegundos = fechaPrimerCargo.getTime() - fechaOtorgamiento.getTime();
                const diasCalculados = Math.floor(diferenciaMilisegundos / milisegundosPorDia);
                
                // Fórmula de interés simple: I = (Capital * TNA * días) / (365 * 100)
                // TNA está en porcentaje (ej: 56.00), por eso dividimos por 100
                const interesesMonto = (montoSolicitado * tna * diasCalculados) / (365 * 100);
                
                return {
                    interesesMonto: interesesMonto,
                    diasCalculados: diasCalculados,
                    fechaPrimerVencimiento: fechaPrimerCargo
                };
            };

            // Función para calcular el monto máximo disponible según el plan de cuotas
            // La cuota no puede superar el monto de afectación
            const calcularMontoMaximoDisponible = () => {
                if (!haberNeto || !cuotas) return 0;
                
                const montoAfectacionCalculado = calcularPorcentajeHaber();
                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotas);
                
                // Despejamos P de la fórmula del sistema francés: C = P * [i * (1 + i)^n] / [(1 + i)^n - 1]
                // Donde C = montoAfectacion (la cuota máxima permitida)
                // P = C * [(1 + i)^n - 1] / [i * (1 + i)^n]
                
                const factor = (Math.pow(1 + tasaMensual, numeroCuotas) - 1) / 
                              (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas));
                
                const montoMaximo = montoAfectacionCalculado * factor;
                
                // Nunca superar el monto máximo absoluto definido
                return Math.min(montoMaximo, MONTO_MAXIMO_ABSOLUTO);
            };

            // Función para calcular ayuda económica en pantalla de Retirados
            const calcularAyudaRetirado = () => {
                setErrorRetirado('');
                setResultadoRetirado(null);

                if (!haberNeto) {
                    setErrorRetirado('Por favor, ingrese el Haber Neto');
                    return;
                }

                if (!montoAyudaEconomica) {
                    setErrorRetirado('Por favor, ingrese el Monto de Ayuda Económica');
                    return;
                }
                
                // Validar que si hay saldoAyuda debe haber monto de cuota
                for (const cuota of cuotasAyudaEconomica) {
                    if (cuota.saldoAyuda && !cuota.monto) {
                        setErrorRetirado('Si ingresa un saldo de ayuda económica vigente, debe completar el campo de cuota correspondiente');
                        return;
                    }
                }

                const montoAyudaNumerico = parseFloat(montoAyudaEconomica.replace(/\./g, ''));
                
                // Calcular el total de saldos de ayudas que se cancelan
                const totalSaldosCancelados = cuotasAyudaEconomica.reduce((total, cuota) => {
                    if (cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseNumeroDecimal(cuota.saldoAyuda);
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // Calcular el monto neto a entregar (lo que recibe en mano)
                const montoNetoAEntregar = montoAyudaNumerico - totalSaldosCancelados;
                
                const montoAfectacionCalculado = calcularPorcentajeHaber();

                if (montoNetoAEntregar <= 0) {
                    setErrorRetirado('El monto de ayuda económica debe ser mayor a cero después de restar los saldos cancelados');
                    return;
                }

                // Validación del Monto Máximo que otorga SMSV
                // Sumar todos los saldos de ayuda económica vigente NO cancelados
                const totalSaldosVigentesNoCancelados = cuotasAyudaEconomica.reduce((total, cuota) => {
                    if (!cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseNumeroDecimal(cuota.saldoAyuda);
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // Suma de saldos vigentes no cancelados + monto solicitado
                const sumaTotal = totalSaldosVigentesNoCancelados + montoAyudaNumerico;
                const montoMaximoSMSVActual = montoMaximoSMSV || MONTO_MAXIMO_ABSOLUTO;
                
                if (sumaTotal > montoMaximoSMSVActual) {
                    setErrorRetirado(`La suma de los saldos de ayuda económica vigente no cancelados ($${totalSaldosVigentesNoCancelados.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) más el monto solicitado ($${montoAyudaNumerico.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) supera el Monto Máximo que otorga SMSV ($${montoMaximoSMSVActual.toLocaleString('es-AR')}). Total: $${sumaTotal.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}.`);
                    return;
                }

                // Cálculo de la cuota usando sistema francés
                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotas);
                
                // CORRECCIÓN: La cuota se calcula sobre el MONTO TOTAL SOLICITADO
                // Fórmula del sistema francés: C = P * [i * (1 + i)^n] / [(1 + i)^n - 1]
                const cuotaMensual = montoAyudaNumerico * (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas)) / 
                                     (Math.pow(1 + tasaMensual, numeroCuotas) - 1);
                
                // Validar que la cuota mensual no supere el monto de afectación
                if (cuotaMensual > montoAfectacionCalculado) {
                    setErrorRetirado(`La cuota mensual calculada ($${cuotaMensual.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) supera el Monto de Afectación ($${montoAfectacionCalculado.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}). Por favor, reduzca el monto solicitado o aumente el número de cuotas.`);
                    return;
                }
                
                // Validación del Salario Mínimo Vital y Móvil
                // Haber Neto + Cuotas de ayudas canceladas - Cuota de la nueva ayuda >= Salario Mínimo
                const haberNetoNumerico = parseFloat(haberNeto.replace(/,/g, '.'));
                const totalCuotasCanceladas = cuotasAyudaEconomica.reduce((total, cuota) => {
                    if (cuota.seCancela && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                const haberDisponible = haberNetoNumerico + totalCuotasCanceladas - cuotaMensual;
                const salarioMinimoActual = salarioMinimo || SALARIO_MINIMO_DEFAULT;
                
                if (haberDisponible < salarioMinimoActual) {
                    setErrorRetirado(`El haber disponible después del descuento de la cuota ($${haberDisponible.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) es menor al Salario Mínimo Vital y Móvil ($${salarioMinimoActual.toLocaleString('es-AR')}). Por favor, reduzca el monto solicitado o aumente el número de cuotas.`);
                    return;
                }
                
                const totalAPagar = cuotaMensual * numeroCuotas;
                const interesTotal = totalAPagar - montoAyudaNumerico;

                // CORRECCIÓN: Calcular intereses diferidos sobre el MONTO SOLICITADO ORIGINAL
                // Los intereses por diferimiento se calculan sobre el monto que el socio pidió,
                // NO sobre el monto después de restar las cancelaciones
                const fechaOtorgamientoRetirado = new Date(fechaPagoRetirado + 'T00:00:00');
                const interesesDiferidos = calcularInteresesDiferidos(
                    montoAyudaNumerico,  // ← CAMBIADO: usar el monto solicitado original
                    TNA,
                    mesesDiferimientoRetirado,
                    fechaOtorgamientoRetirado
                );

                setResultadoRetirado({
                    montoSolicitado: montoAyudaNumerico,
                    montoNetoAEntregar: montoNetoAEntregar,
                    totalSaldosCancelados: totalSaldosCancelados,
                    cuotaMensual: cuotaMensual,
                    numeroCuotas: numeroCuotas,
                    totalAPagar: totalAPagar,
                    interesTotal: interesTotal,
                    montoAfectacion: montoAfectacionCalculado,
                    interesesDiferidos: interesesDiferidos.interesesMonto,
                    diasInteresesDiferidos: interesesDiferidos.diasCalculados,
                    fechaPrimerVencimiento: interesesDiferidos.fechaPrimerVencimiento,
                    mesesDiferimiento: mesesDiferimientoRetirado
                });
            };

            // Funciones para Caja Policial (misma lógica que retirados)
            const calcularPorcentajeHaberCaja = () => {
                if (!haberNetoCaja) return 0;
                // Reemplazar coma por punto para parseFloat
                const haberNetoNumerico = parseFloat(haberNetoCaja.replace(/,/g, '.'));
                
                // Sumar solo las cuotas marcadas como HAB al haber neto
                const totalCuotasAyuda = calcularTotalCuotasAyudaCaja();
                const haberNetoReal = haberNetoNumerico + totalCuotasAyuda;
                
                const porcentaje = esPoderdanteCaja ? 0.45 : 0.40;
                let montoAfectacion = haberNetoReal * porcentaje;
                
                if (esSocioNuevoCaja) {
                    montoAfectacion = montoAfectacion - CUOTA_SOCIAL;
                }
                
                // Restar todas las cuotas con monto que NO estén marcadas con C (seCancela)
                const cuotasARestar = cuotasAyudaEconomicaCaja.reduce((total, cuota) => {
                    if (cuota.monto && !cuota.seCancela) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                montoAfectacion = montoAfectacion - cuotasARestar;
                return montoAfectacion;
            };
            
            const agregarCuotaAyudaCaja = () => {
                const nuevoId = cuotasAyudaEconomicaCaja.length > 0 
                    ? Math.max(...cuotasAyudaEconomicaCaja.map(c => c.id)) + 1 
                    : 1;
                setCuotasAyudaEconomicaCaja([...cuotasAyudaEconomicaCaja, { id: nuevoId, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }]);
            };
            
            const actualizarCuotaAyudaCaja = (id, valor) => {
                setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.map(cuota => 
                    cuota.id === id ? { ...cuota, monto: valor } : cuota
                ));
            };
            
            const actualizarSaldoCuotaCaja = (id, valor) => {
                setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.map(cuota => 
                    cuota.id === id ? { ...cuota, saldoAyuda: valor } : cuota
                ));
            };
            
            const toggleCancelacionCuotaCaja = (id) => {
                setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.map(cuota => 
                    cuota.id === id ? { ...cuota, seCancela: !cuota.seCancela, tasaCancelacion: !cuota.seCancela ? cuota.tasaCancelacion : '' } : cuota
                ));
            };
            
            const actualizarTasaCancelacionCaja = (id, valor) => {
                // Permitir solo números enteros
                const valorLimpio = valor.replace(/[^\d]/g, '');
                setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.map(cuota => 
                    cuota.id === id ? { ...cuota, tasaCancelacion: valorLimpio } : cuota
                ));
            };
            
            const cambiarCanalPagoCuotaCaja = (id) => {
                setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.map(cuota => 
                    cuota.id === id ? { ...cuota, canalPago: cuota.canalPago === 'haberes' ? 'caja' : 'haberes' } : cuota
                ));
            };
            
            const eliminarCuotaAyudaCaja = (id) => {
                if (cuotasAyudaEconomicaCaja.length > 1) {
                    setCuotasAyudaEconomicaCaja(cuotasAyudaEconomicaCaja.filter(cuota => cuota.id !== id));
                }
            };
            
            const calcularTotalCuotasAyudaCaja = () => {
                return cuotasAyudaEconomicaCaja.reduce((total, cuota) => {
                    // Solo sumar las cuotas marcadas como "haberes" (HAB)
                    if (cuota.canalPago === 'haberes' && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
            };

            // Funciones para cuotas de ayuda económica en pantalla En Actividad
            const agregarCuotaAyudaEnActividad = () => {
                const nuevoId = cuotasAyudaEconomicaEnActividad.length > 0 
                    ? Math.max(...cuotasAyudaEconomicaEnActividad.map(c => c.id)) + 1 
                    : 1;
                setCuotasAyudaEconomicaEnActividad([...cuotasAyudaEconomicaEnActividad, { id: nuevoId, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }]);
            };
            
            const actualizarCuotaAyudaEnActividad = (id, valor) => {
                setCuotasAyudaEconomicaEnActividad(cuotasAyudaEconomicaEnActividad.map(cuota => 
                    cuota.id === id ? { ...cuota, monto: valor } : cuota
                ));
            };
            
            const actualizarSaldoCuotaEnActividad = (id, valor) => {
                setCuotasAyudaEconomicaEnActividad(cuotasAyudaEconomicaEnActividad.map(cuota => 
                    cuota.id === id ? { ...cuota, saldoAyuda: valor } : cuota
                ));
            };
            
            const toggleCancelacionCuotaEnActividad = (id) => {
                setCuotasAyudaEconomicaEnActividad(cuotasAyudaEconomicaEnActividad.map(cuota => 
                    cuota.id === id ? { ...cuota, seCancela: !cuota.seCancela, tasaCancelacion: !cuota.seCancela ? cuota.tasaCancelacion : '' } : cuota
                ));
            };
            
            const actualizarTasaCancelacionEnActividad = (id, valor) => {
                // Permitir solo números enteros
                const valorLimpio = valor.replace(/[^\d]/g, '');
                setCuotasAyudaEconomicaEnActividad(cuotasAyudaEconomicaEnActividad.map(cuota => 
                    cuota.id === id ? { ...cuota, tasaCancelacion: valorLimpio } : cuota
                ));
            };
            
            const eliminarCuotaAyudaEnActividad = (id) => {
                if (cuotasAyudaEconomicaEnActividad.length > 1) {
                    setCuotasAyudaEconomicaEnActividad(cuotasAyudaEconomicaEnActividad.filter(cuota => cuota.id !== id));
                }
            };
            
            const calcularTotalCuotasAyudaEnActividad = () => {
                return cuotasAyudaEconomicaEnActividad.reduce((total, cuota) => {
                    // Solo sumar las cuotas que se cancelen (C marcada)
                    if (cuota.seCancela && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
            };

            // Funciones para cuotas de ayuda económica en Haberes (Caja Policial - Haberes)
            const agregarCuotaAyudaHaberes = () => {
                const nuevoId = cuotasAyudaEconomicaHaberes.length > 0 
                    ? Math.max(...cuotasAyudaEconomicaHaberes.map(c => c.id)) + 1 
                    : 1;
                setCuotasAyudaEconomicaHaberes([...cuotasAyudaEconomicaHaberes, { id: nuevoId, monto: '', saldoAyuda: '', seCancela: false, canalPago: 'haberes', tasaCancelacion: '' }]);
            };
            
            const actualizarCuotaAyudaHaberes = (id, valor) => {
                setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.map(cuota => 
                    cuota.id === id ? { ...cuota, monto: valor } : cuota
                ));
            };
            
            const actualizarSaldoCuotaHaberes = (id, valor) => {
                setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.map(cuota => 
                    cuota.id === id ? { ...cuota, saldoAyuda: valor } : cuota
                ));
            };
            
            const toggleCancelacionCuotaHaberes = (id) => {
                setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.map(cuota => 
                    cuota.id === id ? { ...cuota, seCancela: !cuota.seCancela, tasaCancelacion: !cuota.seCancela ? cuota.tasaCancelacion : '' } : cuota
                ));
            };
            
            const actualizarTasaCancelacionHaberes = (id, valor) => {
                // Permitir solo números enteros
                const valorLimpio = valor.replace(/[^\d]/g, '');
                setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.map(cuota => 
                    cuota.id === id ? { ...cuota, tasaCancelacion: valorLimpio } : cuota
                ));
            };
            
            const cambiarCanalPagoCuotaHaberes = (id) => {
                setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.map(cuota => 
                    cuota.id === id ? { ...cuota, canalPago: cuota.canalPago === 'haberes' ? 'caja' : 'haberes' } : cuota
                ));
            };
            
            const eliminarCuotaAyudaHaberes = (id) => {
                if (cuotasAyudaEconomicaHaberes.length > 1) {
                    setCuotasAyudaEconomicaHaberes(cuotasAyudaEconomicaHaberes.filter(cuota => cuota.id !== id));
                }
            };
            
            const calcularTotalCuotasAyudaHaberes = () => {
                return cuotasAyudaEconomicaHaberes.reduce((total, cuota) => {
                    // Solo sumar las cuotas marcadas como "haberes" (HAB) Y que se cancelen (C marcada)
                    if (cuota.canalPago === 'haberes' && cuota.seCancela && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
            };

            // Función para calcular el Monto de Afectación de Haberes
            const calcularMontoAfectacionDeHaberes = () => {
                if (!haberNetoHaberes) return 0;
                
                // Reemplazar coma por punto para parseFloat
                const haberNetoNumerico = parseFloat(haberNetoHaberes.replace(/,/g, '.'));
                
                // Sumar solo las cuotas canceladas marcadas como HAB al haber neto
                const totalCuotasCanceladas = calcularTotalCuotasAyudaHaberes();
                const haberNetoReal = haberNetoNumerico + totalCuotasCanceladas;
                
                const porcentaje = esPoderdanteHaberes ? 0.45 : 0.40;
                let montoAfectacionHaberes = haberNetoReal * porcentaje;
                
                if (esSocioNuevoHaberes) {
                    montoAfectacionHaberes = montoAfectacionHaberes - CUOTA_SOCIAL;
                }
                
                // Restar todas las cuotas con monto que NO estén marcadas con C (seCancela)
                const cuotasARestar = cuotasAyudaEconomicaHaberes.reduce((total, cuota) => {
                    if (cuota.monto && !cuota.seCancela) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                montoAfectacionHaberes = montoAfectacionHaberes - cuotasARestar;
                return montoAfectacionHaberes;
            };

            // Función para calcular Monto de Afectación de Haberes para En Actividad
            const calcularMontoAfectacionDeActividad = () => {
                if (!haberNetoActividad) return 0;
                
                // Reemplazar coma por punto para parseFloat
                const haberNetoNumerico = parseFloat(haberNetoActividad.replace(/,/g, '.'));
                
                // Sumar solo las cuotas canceladas de En Actividad al haber neto
                const totalCuotasCanceladas = calcularTotalCuotasAyudaEnActividad();
                const haberNetoReal = haberNetoNumerico + totalCuotasCanceladas;
                
                // No hay poderdante en En Actividad, siempre es 40%
                const porcentaje = 0.40;
                let montoAfectacionActividad = haberNetoReal * porcentaje;
                
                if (esSocioNuevo) {
                    montoAfectacionActividad = montoAfectacionActividad - CUOTA_SOCIAL;
                }
                
                // Restar todas las cuotas con monto que NO estén marcadas con C (seCancela)
                const cuotasARestar = cuotasAyudaEconomicaEnActividad.reduce((total, cuota) => {
                    if (cuota.monto && !cuota.seCancela) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                montoAfectacionActividad = montoAfectacionActividad - cuotasARestar;
                return montoAfectacionActividad;
            };

            // Función para calcular el Monto Máximo Disponible en En Actividad (con doble control)
            const calcularMontoMaximoDisponibleActividad = () => {
                if (!cuotas) return { disponibleFinal: 0, montoRCI: 0, montoCertificado: 0 };
                
                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotas);
                
                const factor = (Math.pow(1 + tasaMensual, numeroCuotas) - 1) / 
                              (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas));
                
                // Obtener monto de afectación del certificado
                let montoAfectacionCertificado = parseFloat(montoAfectacion.replace(/\./g, '').replace(',', '.')) || 0;
                
                // Ajustar por socio nuevo
                if (esSocioNuevo) {
                    montoAfectacionCertificado = montoAfectacionCertificado - CUOTA_SOCIAL;
                }
                
                // Calcular monto máximo basado en certificado
                const montoMaximoCertificado = montoAfectacionCertificado * factor;
                
                // Si hay haber neto ingresado en En Actividad
                if (haberNetoActividad) {
                    // Calcular monto de afectación de haberes (capacidad según RCI)
                    const montoAfectacionActividadCalculado = calcularMontoAfectacionDeActividad();
                    
                    // Calcular monto máximo basado en haberes (capacidad según RCI)
                    const montoMaximoHaberesActividad = montoAfectacionActividadCalculado * factor;
                    
                    // CRITERIO DE PRUDENCIA: Tomar el MENOR de los dos
                    const disponibleFinal = Math.min(montoMaximoCertificado, montoMaximoHaberesActividad);
                    
                    // Nunca superar el monto máximo absoluto
                    return {
                        disponibleFinal: Math.min(disponibleFinal, MONTO_MAXIMO_ABSOLUTO),
                        montoRCI: montoMaximoHaberesActividad,
                        montoCertificado: montoMaximoCertificado
                    };
                } else {
                    // Si no hay haber neto, solo usar el certificado
                    return {
                        disponibleFinal: Math.min(montoMaximoCertificado, MONTO_MAXIMO_ABSOLUTO),
                        montoRCI: 0,
                        montoCertificado: montoMaximoCertificado
                    };
                }
            };

            // Función para calcular el Monto Máximo Disponible en Haberes
            const calcularMontoMaximoDisponibleHaberes = () => {
                const cuotasActuales = canalPagoCajaPolicial === 'haberes' ? cuotasHaberes : cuotas;
                if (!cuotasActuales) return { disponibleFinal: 0, montoRCI: 0, montoCertificado: 0 };
                
                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotasActuales);
                
                const factor = (Math.pow(1 + tasaMensual, numeroCuotas) - 1) / 
                              (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas));
                
                // Obtener monto de afectación del certificado
                const montoAfectacionActual = canalPagoCajaPolicial === 'haberes' ? montoAfectacionHaberes : montoAfectacion;
                let montoAfectacionCertificado = parseFloat(montoAfectacionActual.replace(/\./g, '').replace(',', '.')) || 0;
                
                // Ajustar por socio nuevo y cuotas canceladas
                const totalCuotasCanceladas = calcularTotalCuotasAyudaHaberes();
                montoAfectacionCertificado = montoAfectacionCertificado + totalCuotasCanceladas;
                
                const esSocioNuevoActual = canalPagoCajaPolicial === 'haberes' ? esSocioNuevoHaberes : esSocioNuevo;
                if (esSocioNuevoActual) {
                    montoAfectacionCertificado = montoAfectacionCertificado - CUOTA_SOCIAL;
                }
                
                // Calcular monto máximo basado en certificado
                const montoMaximoCertificado = montoAfectacionCertificado * factor;
                
                // Si estamos en Caja Policial - Haberes y hay haber neto ingresado
                if (canalPagoCajaPolicial === 'haberes' && haberNetoHaberes) {
                    // Calcular monto de afectación de haberes (capacidad según RCI)
                    const montoAfectacionHaberesCalculado = calcularMontoAfectacionDeHaberes();
                    
                    // Calcular monto máximo basado en haberes (capacidad según RCI)
                    const montoMaximoHaberes = montoAfectacionHaberesCalculado * factor;
                    
                    // CRITERIO DE PRUDENCIA: Tomar el MENOR de los dos
                    const disponibleFinal = Math.min(montoMaximoCertificado, montoMaximoHaberes);
                    
                    // Nunca superar el monto máximo absoluto
                    return {
                        disponibleFinal: Math.min(disponibleFinal, MONTO_MAXIMO_ABSOLUTO),
                        montoRCI: montoMaximoHaberes,
                        montoCertificado: montoMaximoCertificado
                    };
                } else {
                    // Si no hay haber neto, solo usar el certificado
                    return {
                        disponibleFinal: Math.min(montoMaximoCertificado, MONTO_MAXIMO_ABSOLUTO),
                        montoRCI: 0,
                        montoCertificado: montoMaximoCertificado
                    };
                }
            };

            const calcularMontoMaximoDisponibleCaja = () => {
                if (!haberNetoCaja || !cuotas) return 0;
                
                const montoAfectacionCalculado = calcularPorcentajeHaberCaja();
                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotas);
                
                const factor = (Math.pow(1 + tasaMensual, numeroCuotas) - 1) / 
                              (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas));
                
                const montoMaximo = montoAfectacionCalculado * factor;
                
                // Nunca superar el monto máximo absoluto definido
                return Math.min(montoMaximo, MONTO_MAXIMO_ABSOLUTO);
            };

            const calcularAyudaCaja = () => {
                setErrorCaja('');
                setResultadoCaja(null);

                if (!haberNetoCaja) {
                    setErrorCaja('Por favor, ingrese el Haber Neto');
                    return;
                }

                // Validar que si hay saldo ingresado, también haya cuota ingresada
                for (const cuota of cuotasAyudaEconomicaCaja) {
                    const tieneSaldo = cuota.saldoAyuda && cuota.saldoAyuda.trim() !== '';
                    const tieneCuota = cuota.monto && cuota.monto.trim() !== '';
                    
                    if (tieneSaldo && !tieneCuota) {
                        setErrorCaja('Si ingresa Saldo de Ayuda Económica, debe ingresar también la Cuota de Ayuda Económica correspondiente');
                        return;
                    }
                }

                if (!montoAyudaEconomicaCaja) {
                    setErrorCaja('Por favor, ingrese el Monto de Ayuda Económica');
                    return;
                }

                const montoAyudaNumerico = parseFloat(montoAyudaEconomicaCaja.replace(/\./g, ''));
                const montoAfectacionCalculado = calcularPorcentajeHaberCaja();

                if (montoAyudaNumerico <= 0) {
                    setErrorCaja('El monto de ayuda económica debe ser mayor a cero');
                    return;
                }
                
                // Validación del Monto Máximo que otorga SMSV
                // Sumar todos los saldos de ayuda económica vigente NO cancelados
                const totalSaldosVigentesNoCancelados = cuotasAyudaEconomicaCaja.reduce((total, cuota) => {
                    if (!cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseNumeroDecimal(cuota.saldoAyuda);
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // Suma de saldos vigentes no cancelados + monto solicitado
                const sumaTotal = totalSaldosVigentesNoCancelados + montoAyudaNumerico;
                const montoMaximoSMSVActual = montoMaximoSMSV || MONTO_MAXIMO_ABSOLUTO;
                
                if (sumaTotal > montoMaximoSMSVActual) {
                    setErrorCaja(`La suma de los saldos de ayuda económica vigente no cancelados ($${totalSaldosVigentesNoCancelados.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) más el monto solicitado ($${montoAyudaNumerico.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) supera el Monto Máximo que otorga SMSV ($${montoMaximoSMSVActual.toLocaleString('es-AR')}). Total: $${sumaTotal.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}.`);
                    return;
                }
                
                // Calcular la suma de saldos de ayudas económicas que se cancelan (marcadas con C)
                const saldosCancelados = cuotasAyudaEconomicaCaja.reduce((total, cuota) => {
                    if (cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseNumeroDecimal(cuota.saldoAyuda);
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // El monto neto a entregar es el monto solicitado menos los saldos que se cancelan
                const montoNetoAEntregar = montoAyudaNumerico - saldosCancelados;
                
                if (montoNetoAEntregar <= 0) {
                    setErrorCaja('El monto solicitado es menor o igual a los saldos que se cancelan. Por favor, ajuste el monto.');
                    return;
                }

                const tasaMensual = (TNA / 100) / 12;
                const numeroCuotas = parseInt(cuotas);
                
                // CORRECCIÓN: La cuota se calcula sobre el MONTO TOTAL SOLICITADO
                // Fórmula del sistema francés: C = P * [i * (1 + i)^n] / [(1 + i)^n - 1]
                const cuotaMensual = montoAyudaNumerico * (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas)) / 
                                     (Math.pow(1 + tasaMensual, numeroCuotas) - 1);
                
                // Validar que la cuota calculada no supere el monto de afectación
                if (cuotaMensual > montoAfectacionCalculado) {
                    setErrorCaja(`La cuota calculada ($${cuotaMensual.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) supera el Monto de Afectación disponible ($${montoAfectacionCalculado.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}). Por favor, reduzca el monto solicitado o aumente el número de cuotas.`);
                    return;
                }
                
                // Validación del Salario Mínimo Vital y Móvil
                // Haber Neto + Cuotas de ayudas canceladas - Cuota de la nueva ayuda >= Salario Mínimo
                const haberNetoNumerico = parseFloat(haberNetoCaja.replace(/,/g, '.'));
                const totalCuotasCanceladas = cuotasAyudaEconomicaCaja.reduce((total, cuota) => {
                    if (cuota.seCancela && cuota.monto) {
                        const monto = parseNumeroDecimal(cuota.monto);
                        return total + monto;
                    }
                    return total;
                }, 0);
                
                const haberDisponible = haberNetoNumerico + totalCuotasCanceladas - cuotaMensual;
                const salarioMinimoActual = salarioMinimo || SALARIO_MINIMO_DEFAULT;
                
                if (haberDisponible < salarioMinimoActual) {
                    setErrorCaja(`El haber disponible después del descuento de la cuota ($${haberDisponible.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) es menor al Salario Mínimo Vital y Móvil ($${salarioMinimoActual.toLocaleString('es-AR')}). Por favor, reduzca el monto solicitado o aumente el número de cuotas.`);
                    return;
                }
                
                const totalAPagar = cuotaMensual * numeroCuotas;
                const interesTotal = totalAPagar - montoAyudaNumerico;

                // CORRECCIÓN: Calcular intereses diferidos sobre el MONTO SOLICITADO ORIGINAL
                // Los intereses por diferimiento se calculan sobre el monto que el socio pidió,
                // NO sobre el monto después de restar las cancelaciones
                const fechaOtorgamientoCaja = new Date(fechaPagoCaja + 'T00:00:00');
                const interesesDiferidos = calcularInteresesDiferidos(
                    montoAyudaNumerico,  // ← CAMBIADO: usar el monto solicitado original
                    TNA,
                    mesesDiferimientoCaja,
                    fechaOtorgamientoCaja
                );

                setResultadoCaja({
                    montoSolicitado: montoAyudaNumerico,
                    montoNetoAEntregar: montoNetoAEntregar,
                    saldosCancelados: saldosCancelados,
                    cuotaMensual: cuotaMensual,
                    numeroCuotas: numeroCuotas,
                    totalAPagar: totalAPagar,
                    interesTotal: interesTotal,
                    montoAfectacion: montoAfectacionCalculado,
                    interesesDiferidos: interesesDiferidos.interesesMonto,
                    diasInteresesDiferidos: interesesDiferidos.diasCalculados,
                    fechaPrimerVencimiento: interesesDiferidos.fechaPrimerVencimiento,
                    mesesDiferimiento: mesesDiferimientoCaja
                });
            };

            // Función para calcular cuota mensual
            const calcularCuotaMensual = (montoSolicitado, numeroCuotas) => {
                const tasaMensual = (TNA / 100) / 12;
                return montoSolicitado * (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas)) / 
                       (Math.pow(1 + tasaMensual, numeroCuotas) - 1);
            };

            // Generar datos de la tabla
            const generarDatosTabla = () => {
                const datos = [];
                for (let montoSolicitar = 500000; montoSolicitar <= 30000000; montoSolicitar += 500000) {
                    const fila = {
                        monto: montoSolicitar,
                        cuotas: {}
                    };
                    
                    PLANES_CUOTAS.forEach(numeroCuotas => {
                        const cuota = calcularCuotaMensual(montoSolicitar, numeroCuotas);
                        fila.cuotas[numeroCuotas] = cuota;
                    });
                    
                    datos.push(fila);
                }
                return datos;
            };

            // Calcular el monto máximo en función de la afectación y las cuotas
            useEffect(() => {
                const montoAfectacionActual = canalPagoCajaPolicial === 'haberes' ? montoAfectacionHaberes : montoAfectacion;
                let montoAfectacionNumerico = parseFloat(montoAfectacionActual.replace(/\./g, '').replace(',', '.'));
                
                const esSocioNuevoActual = canalPagoCajaPolicial === 'haberes' ? esSocioNuevoHaberes : esSocioNuevo;
                
                // Si estamos en Caja Policial - Haberes, sumar las cuotas canceladas al monto de afectación
                if (canalPagoCajaPolicial === 'haberes') {
                    const totalCuotasCanceladas = calcularTotalCuotasAyudaHaberes();
                    montoAfectacionNumerico = montoAfectacionNumerico + totalCuotasCanceladas;
                }
                
                // Si es socio nuevo, restar la cuota social
                if (esSocioNuevoActual && montoAfectacionNumerico) {
                    montoAfectacionNumerico = montoAfectacionNumerico - CUOTA_SOCIAL;
                }
                
                if (montoAfectacionNumerico && montoAfectacionNumerico > 0) {
                    const tasaMensual = (TNA / 100) / 12;
                    const cuotasActuales = canalPagoCajaPolicial === 'haberes' ? cuotasHaberes : cuotas;
                    const numeroCuotas = parseInt(cuotasActuales);
                    
                    // Calcular el monto máximo que genera una cuota igual al monto de afectación
                    // Despejando P de la fórmula: P = C * [(1 + i)^n - 1] / [i * (1 + i)^n]
                    const montoMaximoCalculado = montoAfectacionNumerico * 
                        (Math.pow(1 + tasaMensual, numeroCuotas) - 1) / 
                        (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas));
                    
                    // El monto máximo es el menor entre el calculado y el absoluto
                    if (canalPagoCajaPolicial === 'haberes') {
                        setMontoMaximoHaberes(Math.min(Math.floor(montoMaximoCalculado), MONTO_MAXIMO_ABSOLUTO));
                    } else {
                        setMontoMaximo(Math.min(Math.floor(montoMaximoCalculado), MONTO_MAXIMO_ABSOLUTO));
                    }
                } else {
                    if (canalPagoCajaPolicial === 'haberes') {
                        setMontoMaximoHaberes(MONTO_MAXIMO_ABSOLUTO);
                    } else {
                        setMontoMaximo(MONTO_MAXIMO_ABSOLUTO);
                    }
                }
            }, [montoAfectacion, montoAfectacionHaberes, cuotas, cuotasHaberes, TNA, esSocioNuevo, esSocioNuevoHaberes, CUOTA_SOCIAL, canalPagoCajaPolicial, cuotasAyudaEconomicaHaberes, cuotasAyudaEconomicaEnActividad]);

            const calcularAyuda = () => {
                if (canalPagoCajaPolicial === 'haberes') {
                    setErrorHaberes('');
                    setResultadoHaberes(null);
                } else {
                    setError('');
                    setResultado(null);
                }

                // Validar que si hay saldo ingresado, también haya cuota ingresada
                const cuotasAValidar = canalPagoCajaPolicial === 'haberes' ? cuotasAyudaEconomicaHaberes : cuotasAyudaEconomicaEnActividad;
                for (const cuota of cuotasAValidar) {
                    const tieneSaldo = cuota.saldoAyuda && cuota.saldoAyuda.trim() !== '';
                    const tieneCuota = cuota.monto && cuota.monto.trim() !== '';
                    
                    if (tieneSaldo && !tieneCuota) {
                        if (canalPagoCajaPolicial === 'haberes') {
                            setErrorHaberes('Si ingresa Saldo de Ayuda Económica, debe ingresar también la Cuota de Ayuda Económica correspondiente');
                        } else {
                            setError('Si ingresa Saldo de Ayuda Económica, debe ingresar también la Cuota de Ayuda Económica correspondiente');
                        }
                        return;
                    }
                }

                const montoActual = canalPagoCajaPolicial === 'haberes' ? montoHaberes : monto;
                const montoNumerico = parseFloat(montoActual.replace(/\./g, ''));
                const montoAfectacionActual = canalPagoCajaPolicial === 'haberes' ? montoAfectacionHaberes : montoAfectacion;
                let montoAfectacionNumerico = parseFloat(montoAfectacionActual.replace(/\./g, '').replace(',', '.'));

                if (!montoNumerico || montoNumerico <= 0) {
                    if (canalPagoCajaPolicial === 'haberes') {
                        setErrorHaberes('Por favor, ingrese un monto válido');
                    } else {
                        setError('Por favor, ingrese un monto válido');
                    }
