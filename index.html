                    return;
                }

                if (!montoAfectacionNumerico || montoAfectacionNumerico <= 0) {
                    if (canalPagoCajaPolicial === 'haberes') {
                        setErrorHaberes('Por favor, ingrese el Monto de Afectación del Certificado 14-12');
                    } else {
                        setError('Por favor, ingrese el Monto de Afectación del Certificado 14-12');
                    }
                    return;
                }

                // Validación del Monto Máximo que otorga SMSV
                // Sumar todos los saldos de ayuda económica vigente NO cancelados
                const totalSaldosVigentesNoCancelados = cuotasAValidar.reduce((total, cuota) => {
                    if (!cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseFloat(cuota.saldoAyuda.replace(/\./g, '').replace(',', '.')) || 0;
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // Suma de saldos vigentes no cancelados + monto solicitado
                const sumaTotal = totalSaldosVigentesNoCancelados + montoNumerico;
                const montoMaximoSMSVActual = montoMaximoSMSV || MONTO_MAXIMO_ABSOLUTO;
                
                if (sumaTotal > montoMaximoSMSVActual) {
                    const mensajeError = `La suma de los saldos de ayuda económica vigente no cancelados ($${totalSaldosVigentesNoCancelados.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) más el monto solicitado ($${montoNumerico.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) supera el Monto Máximo que otorga SMSV ($${montoMaximoSMSVActual.toLocaleString('es-AR')}). Total: $${sumaTotal.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}.`;
                    if (canalPagoCajaPolicial === 'haberes') {
                        setErrorHaberes(mensajeError);
                    } else {
                        setError(mensajeError);
                    }
                    return;
                }

                // Calcular la suma de saldos de ayudas económicas que se cancelan (marcadas con C)
                const saldosCancelados = cuotasAValidar.reduce((total, cuota) => {
                    if (cuota.seCancela && cuota.saldoAyuda) {
                        const saldo = parseFloat(cuota.saldoAyuda.replace(/\./g, '').replace(',', '.')) || 0;
                        return total + saldo;
                    }
                    return total;
                }, 0);
                
                // El monto neto a entregar es el monto solicitado menos los saldos que se cancelan
                const montoNetoAEntregar = montoNumerico - saldosCancelados;
                
                if (montoNetoAEntregar <= 0) {
                    if (canalPagoCajaPolicial === 'haberes') {
                        setErrorHaberes('El monto solicitado es menor o igual a los saldos que se cancelan. Por favor, ajuste el monto.');
                    } else {
                        setError('El monto solicitado es menor o igual a los saldos que se cancelan. Por favor, ajuste el monto.');
                    }
                    return;
                }

                // Calcular el total de cuotas canceladas para sumar al monto de afectación
                const totalCuotasCanceladas = canalPagoCajaPolicial === 'haberes' 
                    ? calcularTotalCuotasAyudaHaberes() 
                    : calcularTotalCuotasAyudaEnActividad();

                const esSocioNuevoActual = canalPagoCajaPolicial === 'haberes' ? esSocioNuevoHaberes : esSocioNuevo;
                
                // Si es socio nuevo, restar la cuota social del monto de afectación del certificado
                let montoAfectacionAjustado = montoAfectacionNumerico + totalCuotasCanceladas;
                if (esSocioNuevoActual) {
                    montoAfectacionAjustado = montoAfectacionAjustado - CUOTA_SOCIAL;
                    if (montoAfectacionAjustado <= 0) {
                        if (canalPagoCajaPolicial === 'haberes') {
                            setErrorHaberes('El monto de afectación después de restar la cuota social debe ser mayor a cero');
                        } else {
                            setError('El monto de afectación después de restar la cuota social debe ser mayor a cero');
                        }
                        return;
                    }
                }

                // Validación especial para Caja Policial - Haberes con haber neto
                if (canalPagoCajaPolicial === 'haberes' && haberNetoHaberes) {
                    // Calcular monto de afectación de haberes
                    const montoAfectacionHaberesCalculado = calcularMontoAfectacionDeHaberes();
                    
                    // Calcular el monto máximo usando ambos montos de afectación
                    const resultadoDisponible = calcularMontoMaximoDisponibleHaberes();
                    
                    if (montoNumerico > resultadoDisponible.disponibleFinal) {
                        setErrorHaberes(`El monto máximo disponible con tu afectación y plan de cuotas es de $${resultadoDisponible.disponibleFinal.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`);
                        return;
                    }
                } else if (canalPagoCajaPolicial !== 'haberes' && haberNetoActividad) {
                    // Validación especial para En Actividad con haber neto
                    // Calcular monto de afectación de haberes
                    const montoAfectacionActividadCalculado = calcularMontoAfectacionDeActividad();
                    
                    // Calcular el monto máximo usando ambos montos de afectación
                    const resultadoDisponible = calcularMontoMaximoDisponibleActividad();
                    
                    if (montoNumerico > resultadoDisponible.disponibleFinal) {
                        setError(`El monto máximo disponible con tu afectación y plan de cuotas es de $${resultadoDisponible.disponibleFinal.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`);
                        return;
                    }
                } else {
                    // Validación normal para otras pantallas
                    const montoMaximoActual = canalPagoCajaPolicial === 'haberes' ? montoMaximoHaberes : montoMaximo;
                    
                    if (montoNumerico > montoMaximoActual) {
                        if (canalPagoCajaPolicial === 'haberes') {
                            setErrorHaberes(`El monto máximo disponible con tu afectación y plan de cuotas es de $${montoMaximoActual.toLocaleString('es-AR')}`);
                        } else {
                            setError(`El monto máximo disponible con tu afectación y plan de cuotas es de $${montoMaximoActual.toLocaleString('es-AR')}`);
                        }
                        return;
                    }
                }

                // Cálculo de la cuota usando sistema francés
                const tasaMensual = (TNA / 100) / 12;
                const cuotasActuales = canalPagoCajaPolicial === 'haberes' ? cuotasHaberes : cuotas;
                const numeroCuotas = parseInt(cuotasActuales);
                
                // CORRECCIÓN: La cuota se calcula sobre el MONTO TOTAL SOLICITADO
                // Fórmula del sistema francés: C = P * [i * (1 + i)^n] / [(1 + i)^n - 1]
                const cuotaMensual = montoNumerico * (tasaMensual * Math.pow(1 + tasaMensual, numeroCuotas)) / 
                                     (Math.pow(1 + tasaMensual, numeroCuotas) - 1);
                
                // Validar que la cuota no supere el monto de afectación ajustado
                // Para Caja Policial - Haberes y En Actividad con haber neto, también validar contra el Monto de Afectación de Haberes
                let montoAfectacionParaValidacion = montoAfectacionAjustado;
                
                if (canalPagoCajaPolicial === 'haberes' && haberNetoHaberes) {
                    const montoAfectacionHaberesCalculado = calcularMontoAfectacionDeHaberes();
                    // Usar el MENOR entre ambos montos de afectación
                    montoAfectacionParaValidacion = Math.min(montoAfectacionAjustado, montoAfectacionHaberesCalculado);
                } else if (canalPagoCajaPolicial !== 'haberes' && haberNetoActividad) {
                    const montoAfectacionActividadCalculado = calcularMontoAfectacionDeActividad();
                    // Usar el MENOR entre ambos montos de afectación
                    montoAfectacionParaValidacion = Math.min(montoAfectacionAjustado, montoAfectacionActividadCalculado);
                }
                
                if (cuotaMensual > montoAfectacionParaValidacion) {
                    if (canalPagoCajaPolicial === 'haberes') {
                        setErrorHaberes(`La cuota mensual ($${cuotaMensual.toFixed(2).replace('.', ',')}) supera el Monto de Afectación disponible ($${montoAfectacionParaValidacion.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}). Por favor, reduzca el monto solicitado o aumente la cantidad de cuotas.`);
                    } else {
                        setError(`La cuota mensual ($${cuotaMensual.toFixed(2).replace('.', ',')}) supera el Monto de Afectación disponible ($${montoAfectacionParaValidacion.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}). Por favor, reduzca el monto solicitado o aumente la cantidad de cuotas.`);
                    }
                    return;
                }
                
                // Validación del Salario Mínimo Vital y Móvil
                // Haber Neto + Cuotas de ayudas canceladas - Cuota de la nueva ayuda >= Salario Mínimo
                let haberNetoNumerico = 0;
                
                if (canalPagoCajaPolicial === 'haberes' && haberNetoHaberes) {
                    haberNetoNumerico = parseFloat(haberNetoHaberes.replace(/,/g, '.'));
                } else if (canalPagoCajaPolicial !== 'haberes' && haberNetoActividad) {
                    haberNetoNumerico = parseFloat(haberNetoActividad.replace(/,/g, '.'));
                }
                
                // Solo validar si hay haber neto ingresado
                if (haberNetoNumerico > 0) {
                    const totalCuotasCanceladas = cuotasAValidar.reduce((total, cuota) => {
                        if (cuota.seCancela && cuota.monto) {
                            const monto = parseFloat(cuota.monto.replace(/\./g, '').replace(',', '.')) || 0;
                            return total + monto;
                        }
                        return total;
                    }, 0);
                    
                    const haberDisponible = haberNetoNumerico + totalCuotasCanceladas - cuotaMensual;
                    const salarioMinimoActual = salarioMinimo || SALARIO_MINIMO_DEFAULT;
                    
                    if (haberDisponible < salarioMinimoActual) {
                        const mensajeError = `El haber disponible después del descuento de la cuota ($${haberDisponible.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}) es menor al Salario Mínimo Vital y Móvil ($${salarioMinimoActual.toLocaleString('es-AR')}). Por favor, reduzca el monto solicitado o aumente el número de cuotas.`;
                        if (canalPagoCajaPolicial === 'haberes') {
                            setErrorHaberes(mensajeError);
                        } else {
                            setError(mensajeError);
                        }
                        return;
                    }
                }
                
                const totalAPagar = cuotaMensual * numeroCuotas;
                const interesTotal = totalAPagar - montoNumerico;

                // CORRECCIÓN: Calcular intereses diferidos sobre el MONTO SOLICITADO ORIGINAL
                // Los intereses por diferimiento se calculan sobre el monto que el socio pidió,
                // NO sobre el monto después de restar las cancelaciones
                const mesesDiferimientoActual = canalPagoCajaPolicial === 'haberes' ? mesesDiferimientoHaberes : mesesDiferimientoActividad;
                const fechaOtorgamientoActual = canalPagoCajaPolicial === 'haberes' 
                    ? new Date(fechaPagoHaberes + 'T00:00:00')
                    : new Date(fechaPagoActividad + 'T00:00:00');
                const interesesDiferidos = calcularInteresesDiferidos(
                    montoNumerico,  // ← CAMBIADO: usar el monto solicitado original
                    TNA,
                    mesesDiferimientoActual,
                    fechaOtorgamientoActual
                );

                if (canalPagoCajaPolicial === 'haberes') {
                    setResultadoHaberes({
                        montoSolicitado: montoNumerico,
                        montoNetoAEntregar: montoNetoAEntregar,
                        saldosCancelados: saldosCancelados,
                        cuotaMensual: cuotaMensual,
                        numeroCuotas: numeroCuotas,
                        totalAPagar: totalAPagar,
                        interesTotal: interesTotal,
                        montoAfectacion: montoAfectacionAjustado,
                        interesesDiferidos: interesesDiferidos.interesesMonto,
                        diasInteresesDiferidos: interesesDiferidos.diasCalculados,
                        fechaPrimerVencimiento: interesesDiferidos.fechaPrimerVencimiento,
                        mesesDiferimiento: mesesDiferimientoActual
                    });
                } else {
                    setResultado({
                        montoSolicitado: montoNumerico,
                        montoNetoAEntregar: montoNetoAEntregar,
                        saldosCancelados: saldosCancelados,
                        cuotaMensual: cuotaMensual,
                        numeroCuotas: numeroCuotas,
                        totalAPagar: totalAPagar,
                        interesTotal: interesTotal,
                        montoAfectacion: montoAfectacionAjustado,
                        interesesDiferidos: interesesDiferidos.interesesMonto,
                        diasInteresesDiferidos: interesesDiferidos.diasCalculados,
                        fechaPrimerVencimiento: interesesDiferidos.fechaPrimerVencimiento,
                        mesesDiferimiento: mesesDiferimientoActual
                    });
                }
            };

            const formatearNumero = (valor) => {
                const numero = valor.replace(/\D/g, '');
                return numero.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            };

            const formatearNumeroConDecimales = (valor) => {
                // Eliminar todo excepto números, coma y punto
                let limpio = valor.replace(/[^\d,\.]/g, '');
                
                // Convertir punto a coma si se usa como decimal
                // Si hay solo un punto y no hay coma, lo tratamos como decimal
                const tieneComa = limpio.includes(',');
                const tienePunto = limpio.includes('.');
                
                if (tienePunto && !tieneComa) {
                    // Si solo tiene punto, lo convertimos a coma para decimales
                    const partes = limpio.split('.');
                    if (partes.length === 2) {
                        // Es un decimal, convertir punto a coma
                        limpio = limpio.replace('.', ',');
                    }
                }
                
                // Eliminar todos los puntos adicionales
                limpio = limpio.replace(/\./g, '');
                
                // Asegurar solo una coma
                const partes = limpio.split(',');
                if (partes.length > 2) {
                    limpio = partes[0] + ',' + partes.slice(1).join('');
                }
                
                // Limitar a 2 decimales
                const [entero, decimal] = limpio.split(',');
                if (decimal && decimal.length > 2) {
                    limpio = entero + ',' + decimal.substring(0, 2);
                }
                
                // NO formatear con puntos de miles, devolver tal cual
                return limpio;
            };

            const handleMontoChange = (e) => {
                const valorFormateado = formatearNumero(e.target.value);
                if (canalPagoCajaPolicial === 'haberes') {
                    setMontoHaberes(valorFormateado);
                } else {
                    setMonto(valorFormateado);
                }
            };

            const handleMontoAfectacionChange = (e) => {
                const valor = e.target.value;
                
                // Si el valor contiene un +, procesar como suma
                if (valor.includes('+')) {
                    // Permitir el ingreso mientras se escribe
                    if (canalPagoCajaPolicial === 'haberes') {
                        setMontoAfectacionHaberes(valor);
                    } else {
                        setMontoAfectacion(valor);
                    }
                    
                    // Intentar evaluar la suma
                    const partes = valor.split('+').map(p => p.trim());
                    
                    // Verificar si todas las partes son números válidos
                    const numerosValidos = partes.every(parte => {
                        if (parte === '') return false;
                        // Convertir formato argentino (1.234.567,89) a número
                        const numero = parseFloat(parte.replace(/\./g, '').replace(',', '.'));
                        return !isNaN(numero);
                    });
                    
                    // Si todas las partes son válidas, calcular la suma
                    if (numerosValidos && partes.length > 1) {
                        const suma = partes.reduce((total, parte) => {
                            const numero = parseFloat(parte.replace(/\./g, '').replace(',', '.'));
                            return total + numero;
                        }, 0);
                        
                        // Formatear el resultado en formato argentino
                        const resultado = suma.toFixed(2).replace('.', ',');
                        
                        // Actualizar el campo con el resultado
                        if (canalPagoCajaPolicial === 'haberes') {
                            setMontoAfectacionHaberes(resultado);
                        } else {
                            setMontoAfectacion(resultado);
                        }
                    }
                } else {
                    // Comportamiento normal: formatear el número
                    const valorFormateado = formatearNumeroConDecimales(valor);
                    if (canalPagoCajaPolicial === 'haberes') {
                        setMontoAfectacionHaberes(valorFormateado);
                    } else {
                        setMontoAfectacion(valorFormateado);
                    }
                }
            };

            // Funciones para la calculadora
            const agregarNumeroCalculadora = (num) => {

            const agregarOperadorCalculadora = (op) => {
                // Solo agregar operador si hay un número en el display actual
                if (displayCalculadora) {
                    setOperacionCalculadora(prev => prev + displayCalculadora + op);
                    setDisplayCalculadora('');

            };

            const calcularResultadoCalculadora = () => {
                let expresion = operacionCalculadora + displayCalculadora;
                
                // Evaluar la expresión (solo suma y resta)
                try {
                    // Separar por operadores manteniendo los signos
                    const partes = expresion.split(/(\+|\-)/).filter(p => p && p.trim());
                    
                    let resultado = 0;
                    let operador = '+';
                    
                    for (let i = 0; i < partes.length; i++) {
                        const parte = partes[i].trim();
                        
                        if (parte === '+' || parte === '-') {
                            operador = parte;
                        } else {
                            const numero = parseFloat(parte.replace(/\./g, '').replace(',', '.'));
                            if (!isNaN(numero)) {
                                if (operador === '+') {
                                    resultado += numero;
                                } else if (operador === '-') {

                                }

                        }
                    }

                            const scriptExistente = document.querySelector(`script[src="${src}"]`);
                            if (scriptExistente) {
                                resolve();
                                return;
                            }
                            
                            const script = document.createElement('script');
                            script.src = src;
                            script.onload = resolve;
                            script.onerror = reject;
                            document.head.appendChild(script);

                    };
                    
                    // Cargar jsPDF y autotable solo cuando se necesitan
                    if (!window.jspdf) {
                        await cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

                    // Esperar un momento para que jsPDF se inicialice
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    if (!window.jspdf.jsPDF.API.autoTable) {

                                minimumFractionDigits: 0,
                                maximumFractionDigits: 0
                            })}`
                        )
                    ]);
                    
                    // Generar tabla

                        head: headers,
                        body: rows,
                        startY: 35,
                        theme: 'grid',

                            fontSize: 9,
                            cellPadding: 3,
                            halign: 'center'

                        alternateRowStyles: {
                            fillColor: [249, 250, 251]
                        }

                    doc.setTextColor(150, 150, 150);
                    doc.text('Valores aproximados. Para información exacta consultar en nuestras filiales.', 148, finalY, { align: 'center' });
                    
                    // Convertir PDF a base64

                    // Intentar usar Web Share API si está disponible

                                files: [file]
                            });
                            return;
                        }

                                        className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"
                                    />
                                    <label htmlFor="modificarTasa" className="ml-2 text-sm text-gray-700 cursor-pointer">
                                        Modificar tasa manualmente
                                    </label>
                                </div>
                                {modificarTasa && (
                                    <div className="mt-3">
                                        <div className="relative">
                                            <input
                                                type="number"
                                                step="0.01"
                                                value={tasaPersonalizada}
                                                onChange={(e) => setTasaPersonalizada(e.target.value)}
                                                className="w-full px-4 py-2 border-2 border-blue-300 rounded-lg focus:border-blue-500 focus:outline-none"
                                                placeholder="Ej: 56.00"
                                            />
                                            <span className="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500">%</span>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-1">
                                            Esta tasa se usará para calcular las cuotas
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {(canalPagoCajaPolicial === 'haberes' ? errorHaberes : error) && (
                            <div className="mb-6 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded">
                                <p className="font-semibold">⚠️ {canalPagoCajaPolicial === 'haberes' ? errorHaberes : error}</p>
                            </div>
                        )}

                        <button
                            onClick={calcularAyuda}
                            className="w-full bg-[#155E75] hover:bg-[#0d3d4d] text-white font-bold py-4 px-6 rounded-lg text-xl shadow-lg transition-all transform hover:scale-105"
                        >
                            🧮 Calcular
                        </button>
                        
                        {/* Salario Mínimo Vital y Móvil */}
                        <div className="mt-3 text-center">
                            <p className="text-xs text-black">
                                {salarioMinimo ? (
                                    `Salario Mínimo Vital y Móvil: $${salarioMinimo.toLocaleString('es-AR')}`
                                ) : (
                                    'Salario Mínimo: No disponible'
                                )}
                            </p>
                            <button
                                onClick={() => {
                                    setModificarSalarioMinimo(!modificarSalarioMinimo);
                                    if (!modificarSalarioMinimo) {
                                        setSalarioMinimoPersonalizado(salarioMinimo?.toString() || SALARIO_MINIMO_DEFAULT.toString());
                                    }
                                }}
                                className="text-xs text-blue-600 hover:text-blue-800 underline mt-1"
                            >
                                {modificarSalarioMinimo ? '✖ Cancelar edición' : '✏️ Editar manualmente'}
                            </button>
                            
                            {modificarSalarioMinimo && (
                                <div className="mt-3 bg-blue-50 p-3 rounded-lg">
                                    <input
                                        type="number"
                                        step="1"
                                        value={salarioMinimoPersonalizado}
                                        onChange={(e) => setSalarioMinimoPersonalizado(e.target.value)}
                                        className="w-full px-3 py-2 border-2 border-blue-300 rounded-lg focus:border-blue-500 focus:outline-none text-center"
                                        placeholder="Ingrese el salario mínimo"
                                    />
                                    <button
                                        onClick={() => {
                                            const nuevoSalario = parseFloat(salarioMinimoPersonalizado);
                                            if (!isNaN(nuevoSalario) && nuevoSalario > 0) {
                                                setSalarioMinimo(nuevoSalario);
                                                setSalarioMinimoEditadoManualmente(true);
                                                localStorage.setItem('salarioMinimoPersonalizado', salarioMinimoPersonalizado);
                                                localStorage.setItem('salarioMinimoEditadoManualmente', 'true');
                                                setModificarSalarioMinimo(false);
                                            } else {
                                                alert('Por favor ingrese un valor válido');
                                            }
                                        }}
                                        className="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg"
                                    >
                                        ✓ Guardar Salario Mínimo
                                    </button>
                                    <p className="text-xs text-gray-600 mt-2">
                                        Este valor se guardará hasta que se suba una nueva versión
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Resultados */}
                    {(canalPagoCajaPolicial === 'haberes' ? resultadoHaberes : resultado) && (() => {
                        const resultadoActual = canalPagoCajaPolicial === 'haberes' ? resultadoHaberes : resultado;
                        return (
                        <div className="bg-white rounded-lg shadow-xl p-8 animate-fade-in">
                            <h2 className="text-2xl font-bold text-blue-900 mb-6 text-center">
                                📊 Resultado de tu Ayuda Económica
                            </h2>

                            <div className="space-y-4 mb-6">
                                {/* Desglose del Monto Líquido */}
                                <div className="p-4 bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg border-2 border-blue-300">
                                    <h3 className="text-lg font-bold text-blue-900 mb-3">💰 Desglose del Monto Líquido</h3>
                                    
                                    <div className="flex justify-between items-center py-2 border-b border-blue-200">
                                        <span className="text-gray-700 font-semibold">(+) Monto Solicitado:</span>
                                        <span className="text-lg font-bold text-blue-900">
                                            ${resultadoActual.montoSolicitado.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                        </span>
                                    </div>
                                    
                                    {/* PRIMERO: Intereses por Diferimiento (se calculan sobre el monto solicitado) */}
                                    <div className="flex justify-between items-center py-2 border-b border-blue-200">
                                        <span className="text-gray-700 font-semibold">(-) Intereses por Diferimiento ({resultadoActual.diasInteresesDiferidos} días):</span>
                                        <span className="text-lg font-bold text-red-600">
                                            -${resultadoActual.interesesDiferidos.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                        </span>
                                    </div>
                                    
                                    {/* SEGUNDO: Cancelación de Ayudas */}
                                    {resultadoActual.saldosCancelados > 0 && (
                                        <div className="flex justify-between items-center py-2 border-b border-blue-200">
                                            <span className="text-gray-700 font-semibold">(-) Cancelación de Ayudas:</span>
                                            <span className="text-lg font-bold text-red-600">
                                                -${resultadoActual.saldosCancelados.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                            </span>
                                        </div>
                                    )}
                                    
                                    <div className="flex justify-between items-center py-3 mt-2">
                                        <span className="text-gray-800 font-bold text-lg">(=) Monto Líquido a Recibir:</span>
                                        <span className="text-2xl font-bold text-green-700">
                                            ${(resultadoActual.montoSolicitado - (resultadoActual.interesesDiferidos || 0) - (resultadoActual.saldosCancelados || 0)).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                        </span>
                                    </div>
                                    
                                    <p className="text-xs text-gray-600 mt-2">
                                        Plan: {resultadoActual.mesesDiferimiento === 3 ? 'Diferido 3 meses' : 'Inmediato'} | Fecha del 1er vencimiento: {new Date(resultadoActual.fechaPrimerVencimiento).toLocaleDateString('es-AR')}
                                    </p>
                                </div>

                                {/* Información del Plan */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-4 bg-orange-50 rounded-lg text-center">
                                        <span className="text-gray-700 font-semibold block mb-1">Cantidad de cuotas:</span>
                                        <span className="text-xl font-bold text-orange-600">
                                            {resultadoActual.numeroCuotas}
                                        </span>
                                    </div>

                                    <div className="p-4 bg-blue-50 rounded-lg text-center">
                                        <span className="text-gray-700 font-semibold block mb-1">TNA:</span>
                                        <span className="text-xl font-bold text-blue-800">{TNA}%</span>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center p-4 bg-green-50 rounded-lg border-2 border-green-300">
                                    <span className="text-gray-700 font-semibold">Cuota mensual:</span>
                                    <span className="text-2xl font-bold text-green-600">
                                        ${resultadoActual.cuotaMensual.toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                    </span>
                                </div>
                            </div>

                            {/* Botón Compartir por WhatsApp */}
                            <div className="mb-4">
                                <button
                                    onClick={compartirPorWhatsApp}
                                    className="w-full bg-[#155E75] hover:bg-[#0d3d4d] text-white font-bold py-3 px-6 rounded-lg text-lg shadow-lg transition-all transform hover:scale-105 flex items-center justify-center gap-2"
                                >
                                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                    </svg>
                                    Compartir por WhatsApp
                                </button>
                            </div>

                            {/* Botón Reiniciar cálculo */}
                            <div className="mb-6">
                                <button
                                    onClick={resetearDatos}
                                    className="w-full bg-[#D97706] hover:bg-[#B45309] text-white font-bold py-3 px-6 rounded-lg text-lg shadow-lg transition-all transform hover:scale-105"
                                >
                                    🔄 Reiniciar cálculo
                                </button>
                            </div>
                        </div>
                        );
                    })()}

                    {/* Modal Calculadora */}
                    {mostrarCalculadora && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm">
                                {/* Header */}
                                <div className="bg-[#155E75] text-white p-4 rounded-t-lg flex justify-between items-center">
                                    <h3 className="text-lg font-bold flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="4" y="2" width="16" height="20" rx="2"/>
                                            <line x1="8" y1="6" x2="16" y2="6"/>
                                            <line x1="16" y1="14" x2="16" y2="14"/>
                                            <line x1="8" y1="14" x2="8" y2="14"/>
                                            <line x1="12" y1="14" x2="12" y2="14"/>
                                            <line x1="16" y1="18" x2="16" y2="18"/>
                                            <line x1="8" y1="18" x2="8" y2="18"/>
                                            <line x1="12" y1="18" x2="12" y2="18"/>
                                        </svg>
                                        Calculadora
                                    </h3>
                                    <button
                                        onClick={() => {
                                            setMostrarCalculadora(false);
                                            setDisplayCalculadora('');
                                            setOperacionCalculadora('');
                                        }}
                                        className="text-white hover:text-gray-200 font-bold text-2xl"
                                    >
                                        ×
                                    </button>
                                </div>

                                {/* Display */}
                                <div className="p-4 bg-gray-100">
                                    <div className="text-lg text-gray-800 font-bold h-8 overflow-x-auto whitespace-nowrap mb-1">
                                        {operacionCalculadora}
                                    </div>
                                    <div className="bg-white border-2 border-gray-300 rounded p-3 text-right text-3xl font-bold min-h-[60px] flex items-center justify-end">
                                        {displayCalculadora || '0'}
                                    </div>
                                </div>

                                {/* Teclado */}
                                <div className="p-4 grid grid-cols-4 gap-2">
                                    {/* Números */}
                                    {['7', '8', '9'].map(num => (
                                        <button
                                            key={num}
                                            onClick={() => agregarNumeroCalculadora(num)}
                                            className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-xl transition-all"
                                        >
                                            {num}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => agregarOperadorCalculadora('+')}
                                        className="bg-[#155E75] hover:bg-[#0d3d4d] text-white font-bold py-4 rounded-lg text-xl transition-all"
                                    >
                                        +
                                    </button>

                                    {['4', '5', '6'].map(num => (
                                        <button
                                            key={num}
                                            onClick={() => agregarNumeroCalculadora(num)}
                                            className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-xl transition-all"
                                        >
                                            {num}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => agregarOperadorCalculadora('-')}
                                        className="bg-[#155E75] hover:bg-[#0d3d4d] text-white font-bold py-4 rounded-lg text-xl transition-all"
                                    >
                                        −
                                    </button>

                                    {['1', '2', '3'].map(num => (
                                        <button
                                            key={num}
                                            onClick={() => agregarNumeroCalculadora(num)}
                                            className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-xl transition-all"
                                        >
                                            {num}
                                        </button>
                                    ))}
                                    <button
                                        onClick={calcularResultadoCalculadora}
                                        className="bg-[#047857] hover:bg-[#065f46] text-white font-bold py-4 rounded-lg text-xl transition-all row-span-2"
                                    >
                                        =
                                    </button>

                                    <button
                                        onClick={limpiarCalculadora}
                                        className="bg-[#D97706] hover:bg-[#B45309] text-white font-bold py-4 rounded-lg text-sm transition-all"
                                    >
                                        C
                                    </button>
                                    <button
                                        onClick={() => agregarNumeroCalculadora('0')}
                                        className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-xl transition-all"
                                    >
                                        0
                                    </button>
                                    <button
                                        onClick={() => agregarNumeroCalculadora(',')}
                                        className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-lg text-xl transition-all"
                                    >
                                        ,
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <div className="text-center mt-8"><p className="text-xs text-gray-400">by Filial Libertad</p></div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
        
        // Ocultar pantalla de carga cuando React esté listo
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.3s ease-out';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 300);
            }
        }, 100);
    </script>

    <style>
        /* Animaciones para pantalla de carga */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out;
        }

        /* Estilos para tabla responsive */
        table {
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        @media (max-width: 640px) {
            table {
                font-size: 0.75rem;
            }
            
            th, td {
                padding: 0.5rem 0.25rem !important;
            }
        }

        /* Sticky column para scroll horizontal */
        .sticky {
            position: sticky;
        }
    </style>
</body>
</html>
